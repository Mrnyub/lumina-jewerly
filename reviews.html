<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://cdn.snipcart.com">
    <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.0.31/default/snipcart.css" />
</head>
<body>

    <header>
        <div class="logo" style="display: flex; align-items: center; gap: 10px;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 3h12l4 6-10 13L2 9Z"></path>
                <path d="M11 3v21"></path>
                <path d="M2 9h20"></path>
            </svg>
            Lumina
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Collections</a></li>
                <li><a href="about.html">Atelier</a></li>
                <li><a href="tracker.html">Tracker</a></li>
                <li><a href="reviews.html" style="color: #b76e79;">Reviews</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <button class="snipcart-checkout yellow-basket">
            Bag (<span class="snipcart-items-count">0</span>)
        </button>
    </header>

    <main class="page-container" style="min-height: 60vh;">
        <div class="page-header" style="opacity: 0; animation: fadeUp 1s ease forwards;">
            <h1>Client Experiences</h1>
            <p>Read about the moments our esteemed clientele have shared with us, or leave your own Lumina story.</p>
        </div>

        <section class="reviews" style="margin-top: 0; opacity: 0; animation: fadeUp 1s ease forwards; animation-delay: 0.2s;">
            <div class="review-grid" id="dynamicReviewGrid"></div>

            <div class="review-form-container" style="margin-top: 60px;">
                <h3 style="font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 20px;">Share Your Experience</h3>
                <form id="reviewForm" class="review-form">
                    <input type="text" id="reviewName" placeholder="Your Name" required>
                    <select id="reviewRating" required>
                        <option value="5">⭐⭐⭐⭐⭐ - Stunning!</option>
                        <option value="4">⭐⭐⭐⭐ - Beautiful</option>
                        <option value="3">⭐⭐⭐ - Good</option>
                    </select>
                    <textarea id="reviewText" rows="3" placeholder="Tell us about your piece..." required></textarea>
                    <button type="submit" class="btn primary-btn" style="margin: 0;">Submit Review</button>
                </form>
                <div id="reviewSuccessMessage" style="display: none; color: #b76e79; text-align: center; margin-top: 15px; font-weight: bold;">
                    Thank you! Your experience has been shared.
                </div>
            </div>
        </section>
    </main>

    <footer style="margin-top: 80px;">
        <div class="footer-content">
            <div class="footer-column">
                <div class="logo">✨ LUMINA</div>
            </div>
        </div>
    </footer>

    <script async src="https://cdn.snipcart.com/themes/v3.0.31/default/snipcart.js"></script>

    <script src="script.js"></script>
</body>
</html>
